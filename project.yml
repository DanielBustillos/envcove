name: SecretManager
options:
  bundleIdPrefix: com.daniel
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  SecretManager:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Sources
      - path: Assets.xcassets
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daniel.secretmanager
        PRODUCT_NAME: SecretManager
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: icon
        CODE_SIGN_ENTITLEMENTS: SecretManager.entitlements
        ENABLE_HARDENED_RUNTIME: YES
    entitlements:
      path: SecretManager.entitlements
    info:
      path: Info.plist
      properties:
        CFBundleName: .envCove
        CFBundleDisplayName: .envCove
        CFBundleIdentifier: com.daniel.secretmanager
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundlePackageType: APPL
        CFBundleExecutable: SecretManager
        LSMinimumSystemVersion: "13.0"
        NSPrincipalClass: NSApplication
        NSFaceIDUsageDescription: "SecretManager uses Touch ID to protect your secrets."
        NSHumanReadableCopyright: ""
